<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comando ADS - Sala de Aula Virtual</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
    /* TEMA CYBER HACKER / TERMINAL SITH */
    --primary-color: #ff0000; /* Vermelho Sangue Puro */
    --primary-solid: #cc0000; /* Vermelho ativo */
    --accent-color: #ff3333; /* Vermelho Neon/Brilhante */
    
    --bg-color: #000000; /* Fundo preto puro (Terminal) */
    --card-bg: #050505;  /* Preto quase impenetrável */
    
    --text-main: #ff3333; /* Texto em Vermelho Neon */
    --text-muted: #8b0000; /* Texto secundário vermelho escuro */
    --border-color: #ff0000; /* Linhas em vermelho brilhante */
    
    --shadow-sm: 0 4px 6px rgba(0,0,0,0.8);
    --shadow-md: 0 8px 15px rgba(255, 0, 0, 0.2); /* Sombra hacker red */
    --shadow-glow: 0 0 15px rgba(255, 0, 0, 0.7);
    
    --radius: 0px; /* Quadrado total, estilo terminal vintage */
    --transition: 0.1s ease-in-out; /* Transições secas e rápidas */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'JetBrains Mono', monospace; /* Fonte de código obrigatória */
    background-color: var(--bg-color);
    color: var(--text-main);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-x: hidden;
    text-shadow: 0 0 2px rgba(255, 51, 51, 0.3); /* Brilho sutil vermelho na fonte */
}

a {
    color: var(--accent-color);
    text-decoration: none;
}

/* ========================================================= */
/* NAVBAR / HEADER SITH */
/* ========================================================= */
.navbar {
    background-color: #121212;
    border-bottom: 2px solid var(--border-color);
    color: var(--text-main);
    height: 65px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    z-index: 10;
}

.nav-left, .nav-right {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.15rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-color);
    margin-right: 30px;
    text-shadow: 0 0 8px rgba(255, 51, 51, 0.7); /* Brilho vermelho neon na logo */
}

.logo i {
    font-size: 1.8rem;
}

.selectors-group {
    display: flex;
    align-items: center;
    gap: 15px;
}

.selector-box {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #242424;
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
}

.selector-box i {
    color: var(--text-muted);
}

.selector-box select {
    background: transparent;
    border: none;
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
}

.selector-box option {
    background: #242424;
    color: var(--text-main);
}

.icon-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    padding: 6px;
    transition: var(--transition);
}

.icon-btn:hover {
    color: var(--accent-color);
    background: rgba(255, 255, 255, 0.05);
}

.separator-v {
    width: 1px;
    height: 30px;
    background-color: var(--border-color);
    margin: 0 10px;
}

/* ========================================================= */
/* POMODORO TIMER */
/* ========================================================= */
.pomodoro-timer {
    display: flex;
    align-items: center;
    background: #000000;
    border: 1px solid var(--primary-color);
    border-radius: var(--radius);
    padding: 4px 12px;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
}

.pomodoro-timer.running {
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
    border-color: var(--accent-color);
}

.pomodoro-timer.break-mode {
    border-color: #ff9900; /* Laranja fogo para descanso */
    box-shadow: 0 0 15px rgba(255, 153, 0, 0.6);
}

.time-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent-color);
    margin-right: 10px;
    min-width: 65px;
}

.pomodoro-timer.break-mode .time-display {
    color: #ff9900;
}

.pomodoro-controls {
    display: flex;
    align-items: center;
    gap: 2px;
}

/* ========================================================= */
/* PERFIL E BOTÕES NAV */
/* ========================================================= */
.nav-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: var(--transition);
}

.nav-btn:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

.user-profile {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 10px;
    border-radius: var(--radius);
    transition: var(--transition);
}
.user-profile:hover {
    background: #242424;
}

.user-profile .avatar {
    width: 38px;
    height: 38px;
    background-color: var(--primary-color);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    box-shadow: var(--shadow-glow);
}

.user-info {
    display: flex;
    flex-direction: column;
}
.user-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-main);
}
.user-id {
    font-size: 0.75rem;
    color: var(--text-muted);
}

/* ========================================================= */
/* MAIN VIEWS & BOTOES */
/* ========================================================= */
.main-container {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}

.view {
    display: none;
    animation: fadeIn 0.3s ease forwards;
}

.view.active-view {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.view-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 1rem;
}

.view-header h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn {
    padding: 10px 20px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: var(--transition);
    border: none;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
}

.btn-sm {
    padding: 6px 12px;
    font-size: 0.8rem;
}

.btn-primary {
    background-color: var(--primary-color);
    color: white;
}
.btn-primary:hover {
    background-color: var(--primary-solid);
    box-shadow: var(--shadow-glow);
}

.btn-outline {
    background-color: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-main);
}
.btn-outline:hover {
    border-color: var(--accent-color);
    color: var(--accent-color);
}

/* ========================================================= */
/* DASHBOARD GRID */
/* ========================================================= */
.subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
}

.subject-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    border: 1px solid var(--border-color);
}

.subject-card:hover {
    transform: translateY(-4px);
    border-color: var(--primary-color);
    box-shadow: var(--shadow-md);
}

.card-glow {
    height: 4px;
    background: var(--primary-color);
    width: 0%;
    transition: var(--transition);
}
.subject-card:hover .card-glow {
    width: 100%;
}

.card-content {
    padding: 20px;
    flex: 1;
}

.subject-name {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-main);
}

.subject-meta {
    font-size: 0.85rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
}

.card-actions {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: var(--transition);
}

.subject-card:hover .card-actions {
    opacity: 1;
}

.enter-btn {
    background-color: #242424;
    border: none;
    border-top: 1px solid var(--border-color);
    padding: 14px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
    font-size: 0.85rem;
}

.enter-btn:hover {
    background-color: var(--primary-solid);
    color: white;
}

/* ========================================================= */
/* TRILHA (SUBJECT VIEW) */
/* ========================================================= */
.breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 20px;
}

.subject-header {
    background: var(--card-bg);
    padding: 30px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
    margin-bottom: 24px;
}

.subject-title {
    display: flex;
    align-items: center;
    gap: 16px;
}

.subject-title .icon-wrapper {
    width: 60px;
    height: 60px;
    background-color: #1a0000; /* Fundo vermelho super escuro */
    color: var(--primary-color);
    border-radius: var(--radius);
    border: 1px solid var(--primary-color);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3) inset;
}

.subject-title h2 {
    font-size: 1.8rem;
    color: var(--text-main);
    text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
}

.add-topic-section {
    margin-bottom: 24px;
}

/* Tópicos List */
.topics-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
}

.topics-list::before {
    content: '';
    position: absolute;
    left: 28px;
    top: 0;
    bottom: 0;
    width: 2px;
    background-color: var(--border-color);
    z-index: 0;
}

.topic-item {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
    transition: var(--transition);
}

.topic-item:hover {
    border-color: var(--primary-color);
    transform: translateX(5px);
}

.topic-icon {
    width: 58px;
    height: 58px;
    background-color: var(--bg-color);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--text-muted);
    margin-right: 20px;
}

.topic-item:hover .topic-icon {
    border-color: var(--primary-color);
    color: var(--primary-color);
    box-shadow: var(--shadow-glow);
}

.topic-info { flex: 1; }
.topic-name {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text-main);
}
.topic-date {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
}
.topic-actions {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* ========================================================= */
/* EDITOR E PROBLEMAS DO MUNDO REAL */
/* ========================================================= */
.topic-title-input {
    width: 100%;
    font-size: 2rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    border: none;
    background: transparent;
    padding: 10px 0;
    margin-bottom: 20px;
    color: var(--accent-color);
    outline: none;
    border-bottom: 2px dashed var(--border-color);
    transition: var(--transition);
}
.topic-title-input:focus {
    border-bottom-color: var(--primary-color);
}

/* BOX: APLICAÇÃO NO MUNDO REAL */
.real-world-box {
    background: #1e1e1e;
    border-left: 4px solid var(--primary-color);
    border-radius: var(--radius);
    margin-bottom: 20px;
    padding: 20px;
}

.rw-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent-color);
    margin-bottom: 15px;
    font-family: 'JetBrains Mono', monospace;
}

.rw-content {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.rw-field label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
}

.rw-field input, .rw-field textarea {
    width: 100%;
    background: #000000;
    border: 1px solid var(--border-color);
    color: var(--accent-color);
    padding: 12px;
    border-radius: 4px;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    transition: var(--transition);
}
.rw-field textarea {
    resize: none;
    min-height: 120px;
    overflow: hidden;
}
.rw-field input:focus, .rw-field textarea:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 8px rgba(255,0,0,0.5);
}

/* TOOLBAR & EDITOR TEXT */
.editor-toolbar {
    background: #1a1a1a;
    border: 1px solid var(--border-color);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: none;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
}

.toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
}

.spacer { flex: 1; }

.tool-btn, .color-picker-wrapper {
    background: transparent;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: var(--text-main);
    cursor: pointer;
    transition: var(--transition);
}

.tool-btn:hover, .color-picker-wrapper:hover {
    background: rgba(255,255,255,0.05);
    color: var(--accent-color);
}

.color-picker-wrapper { position: relative; }
.color-picker-wrapper input {
    position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer;
}

.save-status {
    font-size: 0.85rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
}
.save-status.saving { color: var(--accent-color); }
.save-status.saved { color: #4caf50; }

.editor-area {
    background: #000000;
    border: 1px solid var(--border-color);
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 30px;
    min-height: 40vh;
    font-size: 1.05rem;
    line-height: 1.7;
    outline: none;
    color: var(--text-main);
    box-shadow: inset 0 0 10px rgba(255,0,0,0.1); /* Leve brilho interno vermelho */
}
.editor-area:focus { border-color: var(--primary-color); }
.editor-area:empty:before { content: attr(placeholder); color: #555; pointer-events: none; }
.editor-area ul, .editor-area ol { margin-left: 20px; margin-bottom: 15px; }

/* ========================================================= */
/* MODAL PERFIL */
/* ========================================================= */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
}
.modal-overlay.active {
    opacity: 1; pointer-events: auto;
}

.modal-content {
    background: #1a1a1a;
    border: 1px solid var(--border-color);
    border-top: 4px solid var(--primary-color);
    border-radius: var(--radius);
    width: 400px;
    padding: 30px;
    box-shadow: var(--shadow-md);
    transform: translateY(-20px);
    transition: transform 0.3s;
}
.modal-overlay.active .modal-content {
    transform: translateY(0);
}

.modal-content h3 {
    margin-bottom: 20px;
    color: var(--accent-color);
    font-family: 'JetBrains Mono', monospace;
    text-shadow: 0 0 5px rgba(255,0,0,0.6);
}

.form-group {
    margin-bottom: 15px;
}
.form-group label {
    display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-muted);
}
.form-group input {
    width: 100%;
    background: #000000;
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 10px;
    border-radius: 0;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
}
.form-group input:focus { border-color: var(--primary-color); }

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 25px;
}
    </style>
</head>
<body>

    <!-- CABEÇALHO SITH/HACKER -->
    <header class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i class="ph-fill ph-code"></i>
                <span id="headerBrandTxt">ADS Command Center</span>
            </div>
            
            <div class="selectors-group">
                <!-- Seletor de Cursos -->
                <div class="selector-box">
                    <i class="ph ph-graduation-cap"></i>
                    <select id="courseSelect">
                        <!-- Gerado via JS -->
                    </select>
                    <button class="icon-btn" id="btnAddCourse" title="Novo Ambiente/Curso"><i class="ph ph-plus"></i></button>
                    <button class="icon-btn" id="btnDeleteCourse" title="Excluir Curso"><i class="ph ph-trash"></i></button>
                </div>

                <!-- Seletor de Semestre/Módulo -->
                <div class="selector-box">
                    <i class="ph ph-calendar-blank"></i>
                    <select id="semesterSelect">
                        <!-- Gerado via JS -->
                    </select>
                    <button class="icon-btn" id="btnAddSemester" title="Novo Semestre"><i class="ph ph-plus"></i></button>
                    <button class="icon-btn" id="btnDeleteSemester" title="Excluir Semestre"><i class="ph ph-trash"></i></button>
                </div>
            </div>
        </div>
        
        <div class="nav-right">
            <!-- POMODORO TIMER -->
            <div class="pomodoro-timer" id="pomodoroContainer">
                <div class="time-display" id="pomodoroTime">25:00</div>
                <div class="pomodoro-controls">
                    <button class="icon-btn" id="btnPomodoroPlay" title="Iniciar Foco"><i class="ph ph-play"></i></button>
                    <button class="icon-btn" id="btnPomodoroStop" title="Parar/Resetar"><i class="ph ph-stop"></i></button>
                    <button class="icon-btn" id="btnPomodoroMode" title="Alternar Descanso/Foco"><i class="ph ph-coffee"></i></button>
                </div>
            </div>

            <div class="separator-v"></div>

            <button class="nav-btn" id="btnHome" title="Ir para Home" onclick="window.location.href='index.html'">
                <i class="ph ph-house"></i> Home
            </button>
            <div class="user-profile" id="btnProfile" title="Editar Perfil" style="cursor: pointer;">
                <div class="avatar"><i class="ph ph-user"></i></div>
                <div class="user-info">
                    <span class="user-name" id="displayUserName">G. Estudante</span>
                    <span class="user-id" id="displayUserId">Matrícula: Não definida</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">

        <!-- VIEW 1: DASHBOARD DE MATÉRIAS -->
        <section id="view-dashboard" class="view active-view">
            <div class="view-header">
                <h2>Bases de Conhecimento</h2>
                <button class="btn btn-primary" id="btnAddSubject">
                    <i class="ph ph-plus-circle"></i> Criar Disciplina
                </button>
            </div>
            
            <div class="subjects-grid" id="subjectsGrid">
                <!-- Cartões de matérias gerados pelo JS -->
            </div>
        </section>

        <!-- VIEW 2: TRILHA DE APRENDIZAGEM DA MATÉRIA -->
        <section id="view-subject" class="view">
            <div class="breadcrumb">
                <a href="#" onclick="goHome()">Home</a>
                <i class="ph ph-caret-right"></i>
                <span id="breadcrumbSubjectName">Nome da Disciplina</span>
            </div>
            
            <div class="subject-header">
                <div class="subject-title">
                    <div class="icon-wrapper"><i class="ph ph-terminal"></i></div>
                    <h2 id="currentSubjectTitle">Nome da Disciplina</h2>
                </div>
            </div>

            <div class="add-topic-section">
                <button class="btn btn-primary" id="btnAddTopic" style="width: 100%;">
                    <i class="ph ph-plus"></i> Iniciar Nova Sessão / Tópico

/* =====================================================================
   SALA DE AULA VIRTUAL - LÓGICA DO SISTEMA - ADS EDITION
   ===================================================================== */

const DB_NAME = 'AdsSava_DB';
const STORE_NAME = 'topicComplexData'; // Salvaremos um objeto com: { html, problem, solution }

let db;

// 1. INICIALIZAÇÃO DO BANCO (IndexedDB)
function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 2); // v2 para o novo formato
        
        request.onerror = () => reject('Erro ao abrir IndexedDB');
        
        request.onsuccess = (e) => {
            db = e.target.result;
            resolve(db);
        };
        
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };
    });
}

function saveTopicData(topicId, dataObj) {
    if (!db) return;
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.put(dataObj, topicId); // dataObj: { html: "", problem: "", solution: "" }
}

function getTopicData(topicId) {
    return new Promise((resolve) => {
        if (!db) return resolve({ html: '', problem: '', solution: '' });
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(topicId);
        
        request.onsuccess = () => {
            resolve(request.result || { html: '', problem: '', solution: '' });
        };
        request.onerror = () => resolve({ html: '', problem: '', solution: '' });
    });
}

function deleteTopicData(topicId) {
    if(!db) return;
    const transaction = db.transaction([STORE_NAME], 'readwrite');
    const store = transaction.objectStore(STORE_NAME);
    store.delete(topicId);
}

// =====================================================================
// PERFIL DO USUÁRIO
// =====================================================================
let userProfile = {
    name: 'G. Estudante',
    idStr: 'Matrícula: Não definida',
    pic: '',
    pomoFocus: 25,
    pomoBreak: 5
};

function loadProfile() {
    const saved = localStorage.getItem('adsProfile');
    if(saved) {
        userProfile = { ...userProfile, ...JSON.parse(saved) };
    }
    updateProfileUI();
}

function saveProfile() {
    localStorage.setItem('adsProfile', JSON.stringify(userProfile));
    updateProfileUI();
}

function updateProfileUI() {
    document.getElementById('displayUserName').textContent = userProfile.name;
    document.getElementById('displayUserId').textContent = userProfile.idStr;
    const avatarDiv = document.querySelector('.user-profile .avatar');
    if(userProfile.pic && userProfile.pic.trim() !== '') {
        avatarDiv.innerHTML = `<img src="${userProfile.pic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
    } else {

    }
    
    // Atualiza a tela do pomodoro caso não esteja rodando para evitar conflito
    if(!isPomodoroRunning) {

        updatePomodoroUI();

}

// =====================================================================
// GERENCIAMENTO DA ÁRVORE (CURSOS -> SEMESTRES -> MATÉRIAS -> TÓPICOS)
// =====================================================================
let courses = [];
let currentCourseId = null;
let currentSemesterId = null;
let currentSubjectId = null;
let currentTopicId = null;

function loadData() {
    const saved = localStorage.getItem('adsAppTree');
    if (saved) {
        courses = JSON.parse(saved);
        if(courses.length > 0) currentCourseId = courses[0].id;
    } else {
        // Inicialização padrão
        const defaultCourse = {
            id: generateId(),
            name: 'ADS',
            semesters: [{ id: generateId(), name: '1º Semestre', subjects: [] }]
        };
        courses = [defaultCourse];
        currentCourseId = defaultCourse.id;
        saveData();
    }
}

function saveData() {
    localStorage.setItem('adsAppTree', JSON.stringify(courses));
}

function generateId() {
    return 'id_' + Math.random().toString(36).substr(2, 9);
}

function getTodayDate() {
    return new Date().toLocaleDateString('pt-BR');
}

// Helpers de navegação na árvore
function getCurrentCourse() {
    return courses.find(c => c.id === currentCourseId) || courses[0];
}

function getCurrentSemester() {
    const c = getCurrentCourse();
    if(!c || !c.semesters.length) return null;
    // Se ID atual for nulo ou não achou, pega o primeiro
    let sem = c.semesters.find(s => s.id === currentSemesterId);
    if(!sem) {
        currentSemesterId = c.semesters[0].id;
        sem = c.semesters[0];
    }
    return sem;
}

function getCurrentSubject() {
    const sem = getCurrentSemester();
    return sem?.subjects.find(s => s.id === currentSubjectId);
}

function getCurrentTopic() {
    const sub = getCurrentSubject();
    return sub?.topics.find(t => t.id === currentTopicId);
}

// =====================================================================
// UI E NAVEGAÇÃO
// =====================================================================
const viewDashboard = document.getElementById('view-dashboard');
const viewSubject = document.getElementById('view-subject');
const viewEditor = document.getElementById('view-editor');
const courseSelect = document.getElementById('courseSelect');
const semesterSelect = document.getElementById('semesterSelect');
const headerBrandTxt = document.getElementById('headerBrandTxt');

function switchView(viewName) {
    viewDashboard.classList.remove('active-view');
    viewSubject.classList.remove('active-view');
    viewEditor.classList.remove('active-view');

    if(viewName === 'dashboard') {
        currentSubjectId = null;
        currentTopicId = null;
        renderHeaderSelectors();
        renderDashboard();
        viewDashboard.classList.add('active-view');
    } else if(viewName === 'subject') {
        currentTopicId = null;
        renderSubjectView();
        viewSubject.classList.add('active-view');
    } else if(viewName === 'editor') {
        renderEditorView();
        viewEditor.classList.add('active-view');
    }
}

window.goHome = () => switchView('dashboard');
document.getElementById('btnHome').addEventListener('click', goHome);

// HEADER SELECTORS
// =====================================================================
function renderHeaderSelectors() {

    courseSelect.innerHTML = '';

        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;

        currCourse.semesters.forEach(s => {

            opt.value = s.id; opt.textContent = s.name;
            if(s.id === currentSemesterId) opt.selected = true;
            semesterSelect.appendChild(opt);
        });

}

courseSelect.addEventListener('change', (e) => {

});

document.getElementById('btnAddSemester').addEventListener('click', () => {
    const currCourse = getCurrentCourse();
    const name = prompt("Nome do novo Semestre/Módulo:");
    if(name && currCourse) {
        const newS = { id: generateId(), name: name, subjects: [] };
        currCourse.semesters.push(newS);

        switchView('dashboard');

// Excluir Curso
document.getElementById('btnDeleteCourse').addEventListener('click', () => {
    const currCourse = getCurrentCourse();
    if(!currCourse) return;
    
    if(courses.length === 1) {
        alert("Você não pode excluir o seu único curso. Se quiser, renomeie-o ou crie outro primeiro.");
        return;
    }
    
    if(confirm(`ATENÇÃO: Deseja apagar definitivamente o curso "${currCourse.name}" e todas as suas matérias e anotações?`)) {
        courses = courses.filter(c => c.id !== currCourse.id);
        currentCourseId = courses[0].id;
        currentSemesterId = courses[0].semesters.length > 0 ? courses[0].semesters[0].id : null;
        saveData();
        switchView('dashboard');
    }
});

// Excluir Semestre
document.getElementById('btnDeleteSemester').addEventListener('click', () => {
    const currCourse = getCurrentCourse();
    const sem = getCurrentSemester();
    
    if(!currCourse || !sem) return;
    
    if(confirm(`ATENÇÃO: Deseja apagar o "${sem.name}" e todas as disciplinas dentro dele da sua grade?`)) {
        currCourse.semesters = currCourse.semesters.filter(s => s.id !== sem.id);
        currentSemesterId = currCourse.semesters.length > 0 ? currCourse.semesters[0].id : null;
        saveData();
        switchView('dashboard');
    }
});

// =====================================================================
// DASHBOARD
// =====================================================================
const subjectsGrid = document.getElementById('subjectsGrid');

function renderDashboard() {
    subjectsGrid.innerHTML = '';
    const sem = getCurrentSemester();
    
    if(!sem) {
        subjectsGrid.innerHTML = '<p style="color:var(--text-muted); grid-column: 1/-1;">Crie um Semestre/Módulo primeiro.</p>';
        return;
    }

    if(sem.subjects.length === 0) {
        subjectsGrid.innerHTML = '<p style="color:var(--text-muted); grid-column: 1/-1;">O banco de dados está vazio neste módulo. Inicialize uma nova disciplina.</p>';
    }

    const template = document.getElementById('subjectCardTemplate');

    sem.subjects.forEach(sub => {
        const el = template.content.cloneNode(true).firstElementChild;
        el.querySelector('.subject-name').textContent = sub.name;
        el.querySelector('.topics-count').textContent = sub.topics ? sub.topics.length : 0;
        
        el.querySelector('.enter-btn').addEventListener('click', () => {
            currentSubjectId = sub.id;
            switchView('subject');
        });

        el.querySelector('.edit-subject').addEventListener('click', (e) => {
            e.stopPropagation();
            const novo = prompt("Renomear banco de dados disciplinar:", sub.name);
            if(novo) { sub.name = novo; saveData(); renderDashboard(); }
        });

        el.querySelector('.delete-subject').addEventListener('click', (e) => {
            e.stopPropagation();
            if(confirm(`Desativar permanentemente o setor "${sub.name}"?`)) {
                sem.subjects = sem.subjects.filter(s => s.id !== sub.id);
                saveData();
                renderDashboard();
            }
        });

        subjectsGrid.appendChild(el);
    });
}

document.getElementById('btnAddSubject').addEventListener('click', () => {
    const sem = getCurrentSemester();
    if(!sem) return;
    const name = prompt("Defina o nome da nova Base de Conhecimento (Matéria):");
    if(name) {
        sem.subjects.push({ id: generateId(), name: name, topics: [] });
        saveData();
        renderDashboard();
    }
});

const topicsList = document.getElementById('topicsList');

function renderSubjectView() {
    const sub = getCurrentSubject();
    if(!sub) return goHome();

    document.getElementById('breadcrumbSubjectName').textContent = sub.name;
    document.getElementById('breadcrumbSubjectLink').textContent = sub.name;

    (sub.topics || []).forEach(top => {
        const el = template.content.cloneNode(true).firstElementChild;
        el.querySelector('.topic-name').textContent = top.title || 'Sessão Sem Título';
        el.querySelector('.date-span').textContent = top.date || 'Desconhecido';

        el.querySelector('.edit-topic').addEventListener('click', () => {
            currentTopicId = top.id;
            switchView('editor');
        });

        el.querySelector('.delete-topic').addEventListener('click', () => {
            if(confirm(`Corromper o log "${top.title}" para sempre?`)) {
                sub.topics = sub.topics.filter(t => t.id !== top.id);
                deleteTopicData(top.id); // deleta do indexDB a formatacao pesada

                renderSubjectView();

    });

document.getElementById('btnAddTopic').addEventListener('click', () => {

// Toolbar de Formatação
let savedRange = null;

function saveSelection() {
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
        savedRange = sel.getRangeAt(0);
    }
}

function restoreSelection() {
    if (savedRange) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedRange);
    }
}

editorArea.addEventListener('keyup', saveSelection);
editorArea.addEventListener('mouseup', saveSelection);
editorArea.addEventListener('mouseleave', saveSelection);

document.querySelectorAll('.tool-btn[data-command]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => e.preventDefault());
    btn.addEventListener('click', () => {
        restoreSelection();
        document.execCommand(btn.getAttribute('data-command'), false, null);
        editorArea.focus();
    });
});

document.getElementById('textColorPicker').addEventListener('input', (e) => {
    restoreSelection();
    document.execCommand('foreColor', false, e.target.value);
    saveSelection();
});
document.getElementById('bgColorPicker').addEventListener('input', (e) => {
    restoreSelection();
    document.execCommand('hiliteColor', false, e.target.value);
    document.execCommand('backColor', false, e.target.value);
    saveSelection();
});

document.getElementById('btnInsertTask').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('btnInsertTask').addEventListener('click', () => {
    restoreSelection();

    document.execCommand('insertHTML', false, `<br><div><input type="checkbox" style="margin-right: 8px;"><span>Nova tarefa...</span></div><br>`);
    editorArea.focus();
});

// Salvamento
let saveTimeout;
function triggerSave() {
    const top = getCurrentTopic();
    if(!top) return;
    
    updateSaveStatus('saving');
    clearTimeout(saveTimeout);
    
    saveTimeout = setTimeout(() => {
        const dataObj = {
            html: editorArea.innerHTML,
            problem: rwProblemInput.value,
            solution: rwSolutionInput.value
        };
        saveTopicData(top.id, dataObj);
        updateSaveStatus('saved');
    }, 1000);
}

editorArea.addEventListener('input', triggerSave);
editorArea.addEventListener('keyup', triggerSave);
rwProblemInput.addEventListener('input', (e) => { triggerSave(); autoExpand(e.target); });
rwSolutionInput.addEventListener('input', (e) => { triggerSave(); autoExpand(e.target); });

function updateSaveStatus(state) {
    if(state === 'saving') {
        saveStatus.style.color = 'var(--accent-color)';
        saveStatus.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Criptografando...';
    } else if (state === 'saved') {
        saveStatus.style.color = '#4caf50';
        saveStatus.innerHTML = '<i class="ph ph-cloud-check"></i> Seguro no servidor';
    } else {
        saveStatus.style.color = 'var(--text-muted)';
        saveStatus.innerHTML = '<i class="ph ph-check-circle"></i> Sincronizado';
    }
}

// =====================================================================
// POMODORO TIMER LÓGICA
// =====================================================================
let pomodoroInterval = null;
let pomodoroTimeLeft = 25 * 60; // 25 min em segundos
let isPomodoroRunning = false;
let isPomodoroBreak = false; // Módulo de Descanso (5min)

const pomodoroTimeDisplay = document.getElementById('pomodoroTime');
const pomodoroContainer = document.getElementById('pomodoroContainer');

function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
}

function updatePomodoroUI() {
    pomodoroTimeDisplay.textContent = formatTime(pomodoroTimeLeft);
    if(isPomodoroRunning) pomodoroContainer.classList.add('running');
    else pomodoroContainer.classList.remove('running');
    
    if(isPomodoroBreak) pomodoroContainer.classList.add('break-mode');
    else pomodoroContainer.classList.remove('break-mode');
}

function stopPomodoro() {
    clearInterval(pomodoroInterval);
    isPomodoroRunning = false;
    pomodoroTimeLeft = isPomodoroBreak ? (userProfile.pomoBreak * 60) : (userProfile.pomoFocus * 60);
    updatePomodoroUI();
}

document.getElementById('btnPomodoroPlay').addEventListener('click', () => {
    if(isPomodoroRunning) return; // ja rodando
    isPomodoroRunning = true;
    updatePomodoroUI();

    pomodoroInterval = setInterval(() => {
        pomodoroTimeLeft--;
        if(pomodoroTimeLeft <= 0) {
            // Fim do timer! Apitar ou trocar
            stopPomodoro();
            alert(isPomodoroBreak ? "Fim do Descanso! Volte ao Foco." : "Foco Completo! Tire 5 minutos de descanso.");
            // auto-troca
            document.getElementById('btnPomodoroMode').click(); 
        } else {
            updatePomodoroUI();
        }
    }, 1000);
});

document.getElementById('btnPomodoroStop').addEventListener('click', stopPomodoro);

document.getElementById('btnPomodoroMode').addEventListener('click', () => {
    isPomodoroBreak = !isPomodoroBreak;
    stopPomodoro(); // Para e reseta para o novo tempo
});

// =====================================================================
// LÓGICA DO MODAL DE PERFIL
// =====================================================================
const profileModal = document.getElementById('profileModal');
const inputProfileName = document.getElementById('inputProfileName');
const inputProfileId = document.getElementById('inputProfileId');
const inputProfilePic = document.getElementById('inputProfilePic');
const inputPomoFocus = document.getElementById('inputPomoFocus');
const inputPomoBreak = document.getElementById('inputPomoBreak');

document.getElementById('btnProfile').addEventListener('click', () => {
    inputProfileName.value = userProfile.name;
    inputProfileId.value = userProfile.idStr;
    inputProfilePic.value = userProfile.pic || '';
    inputPomoFocus.value = userProfile.pomoFocus;
    inputPomoBreak.value = userProfile.pomoBreak;
    profileModal.classList.add('active');
});

document.getElementById('btnCancelProfile').addEventListener('click', () => profileModal.classList.remove('active'));

document.getElementById('btnSaveProfile').addEventListener('click', () => {
    userProfile.name = inputProfileName.value || 'Desconhecido';
    userProfile.idStr = inputProfileId.value || 'Matrícula não informada';
    userProfile.pic = inputProfilePic.value;
    
    // Valiar os números do Pomodoro
    const f = parseInt(inputPomoFocus.value);
    const b = parseInt(inputPomoBreak.value);
    if(f > 0) userProfile.pomoFocus = f;
    if(b > 0) userProfile.pomoBreak = b;
    
    saveProfile();
    profileModal.classList.remove('active');
});

// =====================================================================
// BOOT
// =====================================================================
async function initApp() {
    try {
        await initDB();
        loadProfile();
        loadData();
        switchView('dashboard');
        updatePomodoroUI();
    } catch(err) {
        console.error("Critical System Failure:", err);
        alert("Falha ao inicializar banco via IndexedDB.");
    }
}

window.addEventListener('DOMContentLoaded', initApp);
    </script>
